<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 Online</title>
    <!-- We use PeerJS to handle the free P2P networking automatically -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            display: flex;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
        }
        .game-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .sidebar {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #turn-status {
            font-size: 22px;
            font-weight: bold;
            min-height: 30px;
            color: #94a3b8;
        }
        .board {
            background: #2563eb;
            padding: 15px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: repeat(7, 65px);
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 4px solid #1d4ed8;
        }
        .cell {
            width: 65px;
            height: 65px;
            background: #0f172a;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.6);
        }
        .cell:hover {
            box-shadow: inset 0 0 15px rgba(255,255,255,0.2);
        }
        .cell.red {
            background: #ef4444;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 10px #ef4444;
        }
        .cell.yellow {
            background: #eab308;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 10px #eab308;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex-grow: 1;
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            font-size: 15px;
        }
        button:hover { background: #2563eb; }
        .restart-btn {
            background: #475569;
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            font-size: 18px;
        }
        .restart-btn:hover { background: #334155; }
        .chat-box {
            flex-grow: 1;
            background: #0f172a;
            border-radius: 8px;
            margin: 15px 0;
            padding: 15px;
            overflow-y: auto;
            height: 250px;
            border: 1px solid #334155;
        }
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .msg { margin-bottom: 10px; font-size: 14.5px; line-height: 1.4; word-break: break-word; }
        .msg .user { font-weight: bold; color: #93c5fd; }
        .msg .user.me { color: #cbd5e1; }
        .sys-msg { color: #10b981; font-style: italic; font-size: 13.5px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- Game Board Area -->
    <div class="game-section">
        <div class="header">
            <h1>Connect 4</h1>
            <div id="turn-status">Waiting for an opponent...</div>
        </div>
        <div class="board" id="board"></div>
        <button class="restart-btn" onclick="requestRestart()">Restart Game</button>
    </div>
    
    <!-- Sidebar / Chat Area -->
    <div class="sidebar">
        <h3 style="margin-top: 0;">Multiplayer Setup</h3>
        <div class="input-group">
            <input type="text" id="username" placeholder="Your Username" value="Player">
        </div>
        
        <div id="conn-ui">
            <div style="background: #0f172a; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #334155;">
                <p style="margin: 0 0 8px 0; font-size: 14px; color: #94a3b8;">Your Room ID (Give to friend):</p>
                <code id="my-id" style="color: #38bdf8; font-size: 18px; font-weight: bold;">Generating...</code>
            </div>
            
            <div class="input-group">
                <input type="text" id="join-id" placeholder="Paste Friend's ID Here">
                <button onclick="joinRoom()">Join</button>
            </div>
        </div>
        
        <h3 style="margin-top: 25px; margin-bottom: 5px;">Live Chat</h3>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-group" style="margin-bottom: 0;">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChat()">
            <button onclick="sendChat()">Send</button>
        </div>
    </div>
</div>

<script>
    // Game Variables
    let board = [];
    let currentPlayer = 1; // 1 = Host (Red), 2 = Guest (Yellow)
    let myPlayerNum = 0; 
    let gameActive = false;
    const ROWS = 6;
    const COLS = 7;

    // Network Variables
    let peer = new Peer(); 
    let conn = null;

    // Initialize the empty board visually and logically
    function initBoard() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        board = [];
        for(let r = 0; r < ROWS; r++) {
            board[r] = [];
            for(let c = 0; c < COLS; c++) {
                board[r][c] = 0;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.r = r;
                cell.dataset.c = c;
                cell.onclick = () => handleCellClick(c);
                boardDiv.appendChild(cell);
            }
        }
    }

    // --- NETWORKING LOGIC ---

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        addSysMsg("Waiting for connection...");
    });

    // When someone joins your room
    peer.on('connection', connection => {
        conn = connection;
        myPlayerNum = 1; // Host is always Player 1 (Red)
        setupConnection();
    });

    // When you join someone else's room
    function joinRoom() {
        const id = document.getElementById('join-id').value.trim();
        if(!id) return alert("Please enter a Room ID!");
        addSysMsg("Connecting...");
        conn = peer.connect(id);
        myPlayerNum = 2; // Guest is always Player 2 (Yellow)
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            addSysMsg("Connected successfully! Game ON.");
            document.getElementById('conn-ui').style.display = 'none';
            startGame();
        });
        
        // Listen for incoming data (Chat, Moves, Restarts)
        conn.on('data', data => {
            if(data.type === 'chat') {
                addChat(data.user, data.msg, false);
            } else if (data.type === 'move') {
                processMove(data.col, false); 
            } else if (data.type === 'restart') {
                resetGameLogic();
                addSysMsg("Your opponent restarted the board.");
            }
        });
    }

    // --- GAME LOGIC ---

    function startGame() {
        resetGameLogic();
    }

    function resetGameLogic() {
        initBoard();
        currentPlayer = 1;
        gameActive = true;
        updateTurnDisplay();
    }

    function requestRestart() {
        if(!conn || !conn.open) return alert("You are not connected to an opponent yet.");
        conn.send({type: 'restart'});
        resetGameLogic();
        addSysMsg("You restarted the board.");
    }

    function handleCellClick(col) {
        if(!gameActive) return alert("Game is over or you aren't connected yet!");
        if(currentPlayer !== myPlayerNum) return alert("Wait for your opponent to move!");
        
        let row = getLowestEmptyRow(col);
        if(row === -1) return; // Column is full
        
        processMove(col, true);
    }

    function getLowestEmptyRow(col) {
        for(let r = ROWS - 1; r >= 0; r--) {
            if(board[r][col] === 0) return r;
        }
        return -1;
    }

    function processMove(col, isLocalMove) {
        let row = getLowestEmptyRow(col);
        board[row][col] = currentPlayer;
        
        // Visually drop the chip
        const cell = document.querySelector(`.cell[data-r="${row}"][data-c="${col}"]`);
        cell.classList.add(currentPlayer === 1 ? 'red' : 'yellow');
        
        // Send move to opponent if we made it
        if(isLocalMove) {
            conn.send({type: 'move', col: col});
        }
        
        // Check for Win or Tie
        if(checkWin(row, col)) {
            gameActive = false;
            const statusEl = document.getElementById('turn-status');
            if (currentPlayer === myPlayerNum) {
                statusEl.innerText = "🎉 YOU WON! 🎉";
                statusEl.style.color = currentPlayer === 1 ? '#ef4444' : '#eab308';
            } else {
                statusEl.innerText = "💀 YOU LOST! 💀";
                statusEl.style.color = '#94a3b8';
            }
            return;
        }
        
        // Switch turn
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updateTurnDisplay();
    }

    function updateTurnDisplay() {
        if(!gameActive) return;
        const statusEl = document.getElementById('turn-status');
        
        if(currentPlayer === myPlayerNum) {
            statusEl.innerText = "Your Turn";
            statusEl.style.color = myPlayerNum === 1 ? '#ef4444' : '#eab308';
        } else {
            statusEl.innerText = "Opponent's Turn...";
            statusEl.style.color = '#94a3b8';
        }
    }

    // Mathematical Win Check (Horizontal, Vertical, Diagonals)
    function checkWin(r, c) {
        const playerColor = board[r][c];
        const directions = [[0,1], [1,0], [1,1], [1,-1]];
        
        for (let [dr, dc] of directions) {
            let consecutiveChips = 1;
            
            // Check forward in direction
            for (let i = 1; i < 4; i++) {
                let nr = r + dr * i, nc = c + dc * i;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === playerColor) {
                    consecutiveChips++;
                } else break;
            }
            // Check backward in direction
            for (let i = 1; i < 4; i++) {
                let nr = r - dr * i, nc = c - dc * i;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === playerColor) {
                    consecutiveChips++;
                } else break;
            }
            if (consecutiveChips >= 4) return true;
        }
        return false;
    }

    // --- CHAT LOGIC ---

    function sendChat() {
        const input = document.getElementById('chat-input');
        let user = document.getElementById('username').value || "Player";
        let text = input.value.trim();
        if(!text) return;
        
        addChat("You", text, true);
        if(conn && conn.open) {
            conn.send({type: 'chat', user: user, msg: text});
        }
        input.value = '';
    }

    function addChat(user, msg, isMe) {
        const box = document.getElementById('chat-box');
        const el = document.createElement('div');
        el.className = 'msg';
        const userClass = isMe ? 'user me' : 'user';
        el.innerHTML = `<span class="${userClass}">${user}:</span> ${msg}`;
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    }

    function addSysMsg(msg) {
        const box = document.getElementById('chat-box');
        const el = document.createElement('div');
        el.className = 'sys-msg';
        el.innerText = msg;
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    }

    // Startup
    window.onload = initBoard;

</script>
</body>
</html>
